name: Daily Elo Training + NST Stats

on:
  schedule:
    # Runs at 05:00 UTC every day (midnight ET / 10pm PT)
    - cron: '0 5 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          # Install common deps if no requirements.txt exists
          pip install requests pandas numpy beautifulsoup4 lxml scipy

      - name: Run Elo updater
        run: |
          python update_elo_ratings.py --current-season

      - name: Scrape NST advanced stats
        continue-on-error: true
        run: |
          SEASON=$(python -c "from datetime import date; d=date.today(); y=d.year if d.month>=10 else d.year-1; print(f'{y}{y+1}')")
          python update_nst_stats.py --season "$SEASON" --sit all --out static/data

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Elo + NST stats $(date -u +%Y-%m-%d)"
          git push
