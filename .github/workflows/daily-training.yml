name: Daily Elo + PBP Stats Refresh

on:
  schedule:
    # 8:07 AM UTC every day (≈ 4:07 AM Eastern Daylight Time)
    - cron: '7 8 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          # Common deps used by NHL.PlayByPlay, NHL.xGModel, etc.
          pip install requests pandas numpy beautifulsoup4 lxml scipy scikit-learn pyarrow

      - name: Run Elo updater
        run: |
          python update_elo_ratings.py --current-season

      - name: Refresh PBP + MoneyPuck stats
        continue-on-error: true
        run: |
          # Use the current season (Oct → next June) for the daily refresh.
          SEASON_YEAR=$(python -c "from datetime import date; d=date.today(); y=d.year if d.month>=10 else d.year-1; print(y)")
          python update_pbp_stats.py --season "$SEASON_YEAR" --stype 2 --out static/data

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update Elo + PBP stats $(date -u +%Y-%m-%d)"
          git push
