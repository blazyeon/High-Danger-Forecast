name: Daily NHL Data Update

on:
  schedule:
    # 5:03 AM UTC every day (covers early morning US time)
    - cron: '3 9 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PBP stats update
        run: python update_pbp_stats.py

      - name: Run Elo ratings update
        run: python update_elo_ratings.py --current-season

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/data/ elo_ratings.db models/xg_validation.json
          git diff --cached --quiet || (git commit -m "🤖 Daily data update: PBP stats + Elo ratings" -m "Triggered by GitHub Actions" && git push)
